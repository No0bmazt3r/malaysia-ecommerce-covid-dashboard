name: Production Deployment to Vercel

on:
  workflow_dispatch: # Allows you to manually trigger the workflow from the GitHub Actions tab

concurrency:
  group: "vercel-prod-deployment-${{ github.ref }}"
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Code Quality (Parallelized)
        run: |
          # Run linting and type checking in parallel to cut verification time in half
          pnpm run lint &
          LINT_PID=$!
          pnpm exec tsc --noEmit &
          TSC_PID=$!
          wait $LINT_PID
          wait $TSC_PID

      - name: Cache Next.js & Vercel Build Assets
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
            .vercel/cache
          key: ${{ runner.os }}-vercel-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-vercel-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-vercel-

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
